apiVersion: apps/v1
kind: Deployment
metadata:
  name: nexus-v3
  labels:
    app: nexus-v3
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nexus-v3
  template:
    metadata:
      labels:
        app: nexus-v3
    spec:
      containers:
        - name: nexus
          image: ghcr.io/example/nexus-v3:latest
          ports:
            - containerPort: 7860
          env:
            - name: APP_ENV
              value: product
            - name: PORT
              value: "7860"
          envFrom:
            - configMapRef:
                name: nexus-v3-config

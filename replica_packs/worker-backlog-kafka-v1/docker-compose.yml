services:
  checkout:
    build:
      context: ./checkout
    command: ["python", "/app/checkout_server.py"]
    volumes:
      - ./runtime:/runtime
    ports:
      - "19080:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"]
      interval: 5s
      timeout: 3s
      retries: 10

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_PASSWORD: nexus
      POSTGRES_USER: nexus
      POSTGRES_DB: checkout
    ports:
      - "15432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nexus -d checkout"]
      interval: 5s
      timeout: 3s
      retries: 5
